<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hikka // Developer Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="container navbar">
        <div class="logo">
          <a href="#"><img src="" alt="" /> <span>Hikka</span></a>
        </div>
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="hamburger-btn"><span></span><span></span><span></span></label>
        <ul class="menu"></ul>
      </div>
    </nav>

    <header id="home" class="layout">
      <div class="container hero-flex">
        <div class="hero-text">
          <h1 class="typed-heading"></h1>
          <p class="subtitle"></p>
          <div class="hero-btns">
            <a href="#" class="btn btn-primary"></a>
          </div>
        </div>
        <div class="hero-image" data-aos="zoom-in">
          <img class="profile-img" src="" alt="" />
        </div>
      </div>
    </header>

    <section id="projects" class="container">
      <h2 class="section-title"></h2>
      <div class="project-grid"></div>
    </section>

    <section id="skills" class="container">
      <h2 class="section-title"></h2>
      <div class="skills-grid"></div>
    </section>

    <footer id="contact">
      <div class="container footer-content"></div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="data.js"></script>
    <script src="render.js"></script>
    <script src="github.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>
  </body>
</html>
